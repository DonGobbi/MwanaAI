# Run the whole MwanaAI app with: docker compose up --build
# Frontend: http://localhost:3100   Backend: http://localhost:5100
# (Host ports 3100/5100 are used to avoid clashing with other apps on 3000/5000.
#  The containers still listen on 3000/5000 internally.)
#
# The frontend reads its keys from frontend/.env.local (Groq + Firebase).
# Make sure that file exists (copy frontend/.env.example to .env.local).

services:
  backend:
    build: ./backend
    container_name: mwanaai-backend
    ports:
      - "5100:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      # Poll for file changes so nodemon hot-reloads from the bind mount on
      # Windows/macOS (native FS events don't cross the mount there).
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: mwanaai-frontend
    ports:
      - "3100:3000"
    env_file:
      - ./frontend/.env.local
    environment:
      - BROWSER=none
      # Enable file-watching for hot reload from a bind mount on Windows/macOS.
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - WDS_SOCKET_PORT=0
      # Where the browser reaches the backend API (host-mapped port).
      - REACT_APP_API_BASE=http://localhost:5100
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    stdin_open: true
    tty: true
    restart: unless-stopped

volumes:
  frontend_node_modules:
  backend_node_modules:
