<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="light-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
    
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="none"/>
      <path d="M 20 0 L 0 0 0 20" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.1" fill="none"/>
    </pattern>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background with pattern -->
  <rect width="600" height="400" fill="url(#bg-gradient)"/>
  <rect width="600" height="400" fill="url(#grid)"/>
  
  <!-- Abstract wave shapes -->
  <path d="M-50,250 C100,200 200,350 350,300 C500,250 550,350 650,300 L650,450 L-50,450 Z" 
        fill="#ffffff" fill-opacity="0.05"/>
  <path d="M-50,280 C80,230 250,380 380,320 C550,240 550,350 650,320 L650,450 L-50,450 Z" 
        fill="#ffffff" fill-opacity="0.07"/>
  
  <!-- Floating elements -->
  <g opacity="0.8">
    <!-- Brain icon representing AI -->
    <path d="M420,120 C420,90 450,70 480,80 C510,70 540,90 540,120 C540,130 535,140 525,145 
             C530,155 525,170 515,175 C520,185 515,200 505,205 C505,215 495,225 485,225 
             C475,225 465,215 465,205 C455,200 450,185 455,175 C445,170 440,155 445,145 
             C435,140 430,130 430,120 C430,110 435,100 445,95 C440,85 445,70 455,65 
             C465,60 480,65 485,75 C490,65 505,60 515,65 C525,70 530,85 525,95 C535,100 540,110 540,120" 
          fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
    
    <!-- Book stack -->
    <g transform="translate(120, 140)">
      <rect x="0" y="0" width="100" height="20" rx="2" fill="#f59e0b"/>
      <rect x="5" y="-20" width="100" height="20" rx="2" fill="#10b981"/>
      <rect x="10" y="-40" width="100" height="20" rx="2" fill="#6366f1"/>
      <rect x="15" y="-60" width="100" height="20" rx="2" fill="#ef4444"/>
    </g>
    
    <!-- Digital elements -->
    <g transform="translate(300, 150)">
      <!-- Laptop -->
      <rect x="-40" y="-10" width="80" height="50" rx="3" fill="#334155"/>
      <rect x="-35" y="-5" width="70" height="40" rx="2" fill="#0ea5e9" opacity="0.7"/>
      <rect x="-50" y="40" width="100" height="5" rx="2" fill="#334155"/>
      
      <!-- Code symbols -->
      <text x="-25" y="5" font-family="monospace" font-size="6" fill="#ffffff">&lt;/&gt;</text>
      <text x="-25" y="15" font-family="monospace" font-size="6" fill="#ffffff">{AI}</text>
      <text x="-25" y="25" font-family="monospace" font-size="6" fill="#ffffff">01</text>
    </g>
  </g>
  
  <!-- Glowing circles -->
  <circle cx="150" cy="100" r="10" fill="#ffffff" opacity="0.6" filter="url(#glow)"/>
  <circle cx="450" cy="200" r="8" fill="#ffffff" opacity="0.6" filter="url(#glow)"/>
  <circle cx="300" cy="80" r="5" fill="#ffffff" opacity="0.6" filter="url(#glow)"/>
  
  <!-- Connecting lines -->
  <line x1="150" y1="100" x2="300" y2="80" stroke="#ffffff" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="300" y1="80" x2="450" y2="200" stroke="#ffffff" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="150" y1="100" x2="450" y2="200" stroke="#ffffff" stroke-width="1" stroke-opacity="0.4"/>
  
  <!-- Main title with subtle shadow -->
  <g filter="url(#glow)">
    <text x="300" y="300" font-family="Arial, sans-serif" font-size="40" font-weight="bold" 
          fill="#ffffff" text-anchor="middle">MwanaAI Learning</text>
  </g>
  
  <!-- Tagline -->
  <text x="300" y="330" font-family="Arial, sans-serif" font-size="20" 
        fill="#ffffff" text-anchor="middle" opacity="0.9">AI-Powered Education Platform</text>
  
  <!-- Call to action -->
  <rect x="225" y="350" width="150" height="40" rx="20" fill="#ffffff"/>
  <text x="300" y="375" font-family="Arial, sans-serif" font-size="16" font-weight="bold" 
        fill="#0ea5e9" text-anchor="middle">Start Learning</text>
</svg>
