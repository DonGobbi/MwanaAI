<?xml version="1.0" encoding="UTF-8"?>
<svg width="300" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="300" height="200" fill="#be123c" />
  
  <!-- Abstract pattern background -->
  <g opacity="0.1" fill="#ffffff">
    <circle cx="50" cy="50" r="20" />
    <circle cx="250" cy="50" r="15" />
    <circle cx="50" cy="150" r="15" />
    <circle cx="250" cy="150" r="20" />
    <path d="M70,40 L230,40 L150,70 Z" />
    <path d="M40,70 L40,130 L70,100 Z" />
    <path d="M260,70 L260,130 L230,100 Z" />
    <path d="M70,160 L230,160 L150,130 Z" />
  </g>
  
  <!-- Chemistry lab setup -->
  <g transform="translate(150, 100)">
    <!-- Lab table -->
    <rect x="-80" y="30" width="160" height="20" rx="2" fill="#78350f" />
    <rect x="-75" y="30" width="150" height="15" rx="1" fill="#92400e" />
    
    <!-- Erlenmeyer flask -->
    <g transform="translate(-40, 0)">
      <path d="M-15,30 L-5,-20 L5,-20 L15,30 Z" fill="#fef2f2" fill-opacity="0.7" />
      <path d="M-5,-20 L5,-20 L5,-25 L-5,-25 Z" fill="#e5e7eb" />
      <path d="M-12,20 C-10,15 10,15 12,20" fill="#ef4444" />
      <path d="M-8,10 C-6,8 -4,12 -2,10 C0,8 2,12 4,10 C6,8 8,12 10,10" fill="none" stroke="#ef4444" stroke-width="1" />
    </g>
    
    <!-- Test tubes in rack -->
    <g transform="translate(30, 10)">
      <rect x="-25" y="0" width="50" height="20" rx="2" fill="#1e293b" />
      <rect x="-20" y="-15" width="5" height="25" rx="2" fill="#fef2f2" fill-opacity="0.7" />
      <rect x="-10" y="-20" width="5" height="30" rx="2" fill="#fef2f2" fill-opacity="0.7" />
      <rect x="0" y="-10" width="5" height="20" rx="2" fill="#fef2f2" fill-opacity="0.7" />
      <rect x="10" y="-25" width="5" height="35" rx="2" fill="#fef2f2" fill-opacity="0.7" />
      
      <!-- Colored liquids -->
      <rect x="-20" y="0" width="5" height="10" rx="0" fill="#3b82f6" />
      <rect x="-10" y="0" width="5" height="10" rx="0" fill="#10b981" />
      <rect x="0" y="0" width="5" height="10" rx="0" fill="#f59e0b" />
      <rect x="10" y="0" width="5" height="10" rx="0" fill="#8b5cf6" />
    </g>
    
    <!-- Bunsen burner -->
    <g transform="translate(-10, 15)">
      <rect x="-7" y="0" width="14" height="15" rx="1" fill="#1e293b" />
      <rect x="-5" y="-10" width="10" height="10" rx="1" fill="#475569" />
      <rect x="-1" y="-20" width="2" height="10" fill="#475569" />
      <path d="M-3,-15 L3,-15 L0,-25 Z" fill="#f97316" />
      <path d="M-2,-17 L2,-17 L0,-22 Z" fill="#fbbf24" />
    </g>
    
    <!-- Molecular model -->
    <g transform="translate(70, 0)">
      <!-- Carbon atom -->
      <circle cx="0" cy="0" r="8" fill="#1e293b" />
      
      <!-- Hydrogen atoms -->
      <circle cx="12" cy="-12" r="6" fill="#94a3b8" />
      <circle cx="-12" cy="-12" r="6" fill="#94a3b8" />
      <circle cx="12" cy="12" r="6" fill="#94a3b8" />
      <circle cx="-12" cy="12" r="6" fill="#94a3b8" />
      
      <!-- Bonds -->
      <line x1="0" y1="0" x2="12" y2="-12" stroke="#1e293b" stroke-width="2" />
      <line x1="0" y1="0" x2="-12" y2="-12" stroke="#1e293b" stroke-width="2" />
      <line x1="0" y1="0" x2="12" y2="12" stroke="#1e293b" stroke-width="2" />
      <line x1="0" y1="0" x2="-12" y2="12" stroke="#1e293b" stroke-width="2" />
    </g>
    
    <!-- Periodic table element -->
    <g transform="translate(-70, -20)">
      <rect x="-15" y="-15" width="30" height="30" fill="#fecdd3" stroke="#be123c" stroke-width="2" />
      <text x="0" y="-5" font-family="Arial, sans-serif" font-weight="bold" font-size="12" text-anchor="middle" fill="#9f1239">H</text>
      <text x="0" y="10" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#9f1239">1.008</text>
    </g>
  </g>
  
  <!-- Title -->
  <rect x="50" y="150" width="200" height="30" rx="5" fill="rgba(255,255,255,0.9)" />
  <text x="150" y="170" font-family="Arial, sans-serif" font-weight="bold" font-size="14" text-anchor="middle" fill="#9f1239">Chemistry Lab Guide</text>
</svg>
