<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="100" viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="100" fill="#ffffff" rx="10" ry="10" />
  
  <!-- Logo elements -->
  <g transform="translate(100, 50)">
    <!-- Abstract logo shape -->
    <circle cx="0" cy="0" r="30" fill="#0369a1" />
    <circle cx="0" cy="0" r="25" fill="#ffffff" />
    <circle cx="0" cy="0" r="20" fill="#0ea5e9" />
    
    <!-- Education symbol -->
    <path d="M-15,-5 L0,-15 L15,-5 L0,5 Z" fill="#ffffff" />
    <rect x="-2" y="5" width="4" height="10" fill="#ffffff" />
  </g>
  
  <!-- Company name -->
  <text x="100" y="75" font-family="Arial, sans-serif" font-weight="bold" font-size="14" text-anchor="middle" fill="#0c4a6e">EduTech Malawi</text>
</svg>
