<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="250" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="250" fill="#059669"/>
  <g fill="#FFFFFF">
    <!-- DNA Double Helix -->
    <path d="M150,70 C180,90 220,110 250,130 C220,150 180,170 150,190" stroke="#FFFFFF" stroke-width="5" fill="none"/>
    <path d="M250,70 C220,90 180,110 150,130 C180,150 220,170 250,190" stroke="#FFFFFF" stroke-width="5" fill="none"/>
    <!-- Connecting lines -->
    <line x1="150" y1="70" x2="250" y2="70" stroke="#FFFFFF" stroke-width="4"/>
    <line x1="165" y1="90" x2="235" y2="90" stroke="#FFFFFF" stroke-width="4"/>
    <line x1="180" y1="110" x2="220" y2="110" stroke="#FFFFFF" stroke-width="4"/>
    <line x1="165" y1="150" x2="235" y2="150" stroke="#FFFFFF" stroke-width="4"/>
    <line x1="150" y1="170" x2="250" y2="170" stroke="#FFFFFF" stroke-width="4"/>
    <line x1="150" y1="190" x2="250" y2="190" stroke="#FFFFFF" stroke-width="4"/>
  </g>
  <text x="200" y="220" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" text-anchor="middle">Biology</text>
</svg>
