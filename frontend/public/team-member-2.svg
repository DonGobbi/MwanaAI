<?xml version="1.0" encoding="UTF-8"?>
<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="300" height="300" fill="#059669" />
  
  <!-- Abstract pattern background -->
  <g opacity="0.1" fill="#ffffff">
    <circle cx="30" cy="30" r="20" />
    <circle cx="270" cy="30" r="15" />
    <circle cx="30" cy="270" r="25" />
    <circle cx="270" cy="270" r="10" />
    <path d="M80,30 L220,30 L150,100 Z" />
    <path d="M30,80 L30,220 L100,150 Z" />
    <path d="M270,80 L270,220 L200,150 Z" />
    <path d="M80,270 L220,270 L150,200 Z" />
  </g>
  
  <!-- Person silhouette -->
  <g transform="translate(150, 130)">
    <!-- Head -->
    <circle cx="0" cy="-60" r="40" fill="#ffffff" />
    
    <!-- Hair -->
    <path d="M-40,-80 C-30,-100 30,-100 40,-80 C40,-80 40,-60 40,-60 C40,-60 30,-70 0,-70 C-30,-70 -40,-60 -40,-60 Z" fill="#4b5563" />
    
    <!-- Body -->
    <path d="M-40,-20 C-40,20 -30,60 -60,100 L60,100 C30,60 40,20 40,-20 C40,-20 0,0 0,0 C0,0 -40,-20 -40,-20 Z" fill="#ffffff" />
    
    <!-- Necklace -->
    <path d="M-10,-15 C-5,-25 5,-25 10,-15" fill="none" stroke="#eab308" stroke-width="3" />
    <circle cx="0" cy="-10" r="3" fill="#eab308" />
    
    <!-- Clothing details -->
    <path d="M-40,-20 C-40,-20 -10,0 0,0 C10,0 40,-20 40,-20" fill="none" stroke="#064e3b" stroke-width="2" />
  </g>
  
  <!-- Name -->
  <rect x="75" y="240" width="150" height="40" rx="5" fill="rgba(255,255,255,0.9)" />
  <text x="150" y="265" font-family="Arial, sans-serif" font-weight="bold" font-size="16" text-anchor="middle" fill="#064e3b">Mary Phiri</text>
  <text x="150" y="280" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#064e3b">Education Director</text>
</svg>
