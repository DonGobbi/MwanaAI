<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="100" viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="100" fill="#ffffff" rx="10" ry="10" />
  
  <!-- Logo elements -->
  <g transform="translate(100, 50)">
    <!-- Abstract logo shape -->
    <rect x="-35" y="-20" width="70" height="40" rx="5" fill="#059669" />
    
    <!-- Book icon -->
    <g transform="translate(-15, 0)">
      <path d="M0,-15 L0,15 L20,10 L20,-10 Z" fill="#ffffff" />
      <path d="M0,-15 L20,-10 M0,-5 L20,0 M0,5 L20,10 M0,15 L20,10" stroke="#059669" stroke-width="1" />
    </g>
    
    <!-- Digital element -->
    <g transform="translate(15, 0)">
      <circle cx="0" cy="0" r="10" fill="#ffffff" />
      <path d="M-5,-5 L5,5 M-5,5 L5,-5" stroke="#059669" stroke-width="2" />
    </g>
  </g>
  
  <!-- Company name -->
  <text x="100" y="75" font-family="Arial, sans-serif" font-weight="bold" font-size="14" text-anchor="middle" fill="#064e3b">Digital Learning Hub</text>
</svg>
