<?xml version="1.0" encoding="UTF-8"?>
<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="300" height="300" fill="#be123c" />
  
  <!-- Abstract pattern background -->
  <g opacity="0.1" fill="#ffffff">
    <circle cx="60" cy="60" r="30" />
    <circle cx="240" cy="60" r="25" />
    <circle cx="60" cy="240" r="20" />
    <circle cx="240" cy="240" r="35" />
    <path d="M100,50 L200,50 L150,100 Z" />
    <path d="M50,100 L50,200 L100,150 Z" />
    <path d="M250,100 L250,200 L200,150 Z" />
    <path d="M100,250 L200,250 L150,200 Z" />
  </g>
  
  <!-- Book pattern elements -->
  <g opacity="0.2" fill="#ffffff">
    <rect x="70" y="70" width="40" height="60" rx="2" />
    <rect x="130" y="50" width="40" height="60" rx="2" />
    <rect x="190" y="70" width="40" height="60" rx="2" />
    <rect x="90" y="170" width="40" height="60" rx="2" />
    <rect x="170" y="170" width="40" height="60" rx="2" />
  </g>
  
  <!-- Person silhouette -->
  <g transform="translate(150, 130)">
    <!-- Head -->
    <circle cx="0" cy="-60" r="40" fill="#ffffff" />
    
    <!-- Hair -->
    <path d="M-40,-60 C-40,-90 -20,-100 0,-100 C20,-100 40,-90 40,-60 C40,-60 30,-70 20,-65 C10,-60 0,-70 -10,-65 C-20,-60 -30,-70 -40,-60 Z" fill="#78350f" />
    <path d="M-40,-60 C-40,-60 -30,-40 -40,-30 C-30,-35 -20,-30 -30,-20 C-20,-25 -10,-20 -20,-10 C-10,-15 0,-10 -5,0 C0,-5 5,0 10,-10 C15,-5 20,-10 25,-20 C30,-15 35,-20 30,-30 C35,-25 40,-30 40,-40 C40,-40 35,-50 40,-60" fill="#78350f" />
    
    <!-- Earrings -->
    <circle cx="-42" cy="-55" r="5" fill="#fcd34d" />
    <circle cx="42" cy="-55" r="5" fill="#fcd34d" />
    
    <!-- Body -->
    <path d="M-40,-20 C-40,20 -30,60 -60,100 L60,100 C30,60 40,20 40,-20 C40,-20 0,0 0,0 C0,0 -40,-20 -40,-20 Z" fill="#ffffff" />
    
    <!-- Necklace -->
    <path d="M-15,-15 C-10,-25 10,-25 15,-15" fill="none" stroke="#fcd34d" stroke-width="3" />
    <path d="M-5,-15 L-5,0 M5,-15 L5,0" stroke="#fcd34d" stroke-width="2" />
    <circle cx="0" cy="0" r="5" fill="#fcd34d" />
    
    <!-- Clothing pattern -->
    <path d="M-30,20 C-20,10 -10,30 0,20 C10,30 20,10 30,20" fill="none" stroke="#be123c" stroke-width="2" stroke-opacity="0.6" />
    <path d="M-25,40 C-15,30 -5,50 5,40 C15,50 25,30 35,40" fill="none" stroke="#be123c" stroke-width="2" stroke-opacity="0.6" />
  </g>
  
  <!-- Name -->
  <rect x="75" y="240" width="150" height="40" rx="5" fill="rgba(255,255,255,0.9)" />
  <text x="150" y="265" font-family="Arial, sans-serif" font-weight="bold" font-size="16" text-anchor="middle" fill="#9f1239">Grace Nyirenda</text>
  <text x="150" y="280" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#9f1239">Curriculum Specialist</text>
</svg>
