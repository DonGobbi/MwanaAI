<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0369a1" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="lightGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bae6fd" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0.2" />
    </linearGradient>
  </defs>
  
  <!-- Main background -->
  <rect width="800" height="600" fill="url(#bgGradient)" />
  
  <!-- Decorative patterns -->
  <g opacity="0.1" fill="#ffffff">
    <circle cx="100" cy="100" r="50" />
    <circle cx="700" cy="100" r="30" />
    <circle cx="100" cy="500" r="40" />
    <circle cx="700" cy="500" r="60" />
    <path d="M200,50 L600,50 L400,150 Z" />
    <path d="M50,200 L50,400 L150,300 Z" />
    <path d="M750,200 L750,400 L650,300 Z" />
    <path d="M200,550 L600,550 L400,450 Z" />
  </g>
  
  <!-- Classroom scene -->
  <g transform="translate(400, 300)">
    <!-- Classroom floor -->
    <rect x="-300" y="50" width="600" height="150" fill="#f3f4f6" />
    
    <!-- Classroom wall -->
    <rect x="-300" y="-100" width="600" height="150" fill="#e5e7eb" />
    
    <!-- Blackboard -->
    <rect x="-200" y="-90" width="400" height="120" rx="5" fill="#1e293b" />
    <rect x="-190" y="-80" width="380" height="100" fill="#374151" />
    
    <!-- Text on blackboard -->
    <text x="0" y="-40" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="#ffffff">MwanaAI Education</text>
    <text x="0" y="-10" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#ffffff">Learning for the Future</text>
    <path d="M-150,-10 L150,-10" stroke="#ffffff" stroke-width="1" stroke-opacity="0.3" />
    <path d="M-100,20 L100,20" stroke="#ffffff" stroke-width="1" stroke-opacity="0.3" />
    
    <!-- Teacher's desk -->
    <rect x="-80" y="30" width="160" height="60" fill="#d97706" />
    <rect x="-75" y="35" width="150" height="50" fill="#f59e0b" />
    
    <!-- Computer on desk -->
    <rect x="-30" y="20" width="60" height="40" rx="3" fill="#1e293b" />
    <rect x="-25" y="25" width="50" height="30" rx="2" fill="#60a5fa" />
    <rect x="-10" y="60" width="20" height="10" fill="#1e293b" />
    <rect x="-20" y="70" width="40" height="5" fill="#1e293b" />
    
    <!-- Students (simplified) -->
    <!-- Student 1 -->
    <g transform="translate(-200, 100)">
      <circle cx="0" cy="-30" r="20" fill="#fcd34d" />
      <path d="M-15,-10 L15,-10 L10,30 L-10,30 Z" fill="#2563eb" />
      <rect x="-25" y="0" width="50" height="10" rx="5" fill="#fcd34d" />
    </g>
    
    <!-- Student 2 -->
    <g transform="translate(-120, 120)">
      <circle cx="0" cy="-30" r="20" fill="#fca5a5" />
      <path d="M-15,-10 L15,-10 L10,30 L-10,30 Z" fill="#ec4899" />
      <rect x="-25" y="0" width="50" height="10" rx="5" fill="#fca5a5" />
    </g>
    
    <!-- Student 3 -->
    <g transform="translate(0, 130)">
      <circle cx="0" cy="-30" r="20" fill="#a78bfa" />
      <path d="M-15,-10 L15,-10 L10,30 L-10,30 Z" fill="#4f46e5" />
      <rect x="-25" y="0" width="50" height="10" rx="5" fill="#a78bfa" />
    </g>
    
    <!-- Student 4 -->
    <g transform="translate(120, 120)">
      <circle cx="0" cy="-30" r="20" fill="#6ee7b7" />
      <path d="M-15,-10 L15,-10 L10,30 L-10,30 Z" fill="#10b981" />
      <rect x="-25" y="0" width="50" height="10" rx="5" fill="#6ee7b7" />
    </g>
    
    <!-- Student 5 -->
    <g transform="translate(200, 100)">
      <circle cx="0" cy="-30" r="20" fill="#fcd34d" />
      <path d="M-15,-10 L15,-10 L10,30 L-10,30 Z" fill="#f59e0b" />
      <rect x="-25" y="0" width="50" height="10" rx="5" fill="#fcd34d" />
    </g>
    
    <!-- Teacher -->
    <g transform="translate(0, 0)">
      <circle cx="0" cy="-60" r="25" fill="#fcd34d" />
      <path d="M-20,-35 L20,-35 L25,30 L-25,30 Z" fill="#0369a1" />
      <rect x="-30" y="-25" width="60" height="10" rx="5" fill="#fcd34d" />
      <path d="M-5,-55 C-5,-55 0,-60 5,-55 C5,-55 5,-50 0,-50 C-5,-50 -5,-55 -5,-55 Z" fill="#1e293b" />
    </g>
    
    <!-- Digital elements -->
    <g transform="translate(-250, -50)">
      <circle cx="0" cy="0" r="30" fill="url(#lightGlow)" opacity="0.7" />
      <path d="M-15,-15 L15,15 M-15,15 L15,-15" stroke="#ffffff" stroke-width="3" />
    </g>
    
    <g transform="translate(250, -50)">
      <circle cx="0" cy="0" r="30" fill="url(#lightGlow)" opacity="0.7" />
      <circle cx="0" cy="0" r="15" fill="none" stroke="#ffffff" stroke-width="3" />
      <circle cx="0" cy="0" r="5" fill="#ffffff" />
    </g>
  </g>
  
  <!-- Digital connection lines -->
  <g stroke="#7dd3fc" stroke-width="2" stroke-dasharray="5,5" opacity="0.7">
    <path d="M150,250 C200,200 250,230 300,200" />
    <path d="M500,250 C450,200 400,230 350,200" />
    <path d="M200,350 C250,300 300,330 350,300" />
    <path d="M600,350 C550,300 500,330 450,300" />
  </g>
  
  <!-- AI brain icon -->
  <g transform="translate(400, 100)">
    <circle cx="0" cy="0" r="50" fill="url(#lightGlow)" />
    <path d="M-25,-20 C-25,-30 -15,-40 0,-40 C15,-40 25,-30 25,-20 C25,-10 15,0 25,10 C35,20 25,30 15,30 C5,30 -5,20 -15,30 C-25,30 -35,20 -25,10 C-15,0 -25,-10 -25,-20 Z" 
          fill="none" stroke="#ffffff" stroke-width="3" />
    <circle cx="-10" cy="-15" r="5" fill="#ffffff" />
    <circle cx="10" cy="-15" r="5" fill="#ffffff" />
    <path d="M-10,10 C-5,15 5,15 10,10" fill="none" stroke="#ffffff" stroke-width="2" />
  </g>
  
  <!-- MwanaAI logo -->
  <text x="400" y="550" font-family="Arial, sans-serif" font-weight="bold" font-size="36" text-anchor="middle" fill="#ffffff">MwanaAI</text>
  <text x="400" y="580" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#bae6fd">Transforming Education in Malawi</text>
</svg>
